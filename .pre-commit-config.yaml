# All hooks below are check-only. They must not rewrite tracked files.
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: unsupported
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: cargo-clippy
        name: cargo clippy --check
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: unsupported
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: agents-md-project-index
        name: AGENTS.md project index --check
        entry: cargo xtask agents-index check
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: cargo-test
        name: cargo test --check
        entry: cargo test --workspace --all-targets --all-features
        language: unsupported
        pass_filenames: false
        stages: [pre-push, manual]
